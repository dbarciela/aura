aura.browser.auto-open=false
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC

# Mock external dependencies for tests
target.server.url=http://localhost:8080/v1
target.webui.url=http://localhost:8080
target.server.restart-script=mock.bat
server.port=8081

# Llama.cpp Update Configuration
llama.cpp.install.dir=mock
llama.cpp.release.regex=mock

# Suppress OSHI WMI warnings
logging.level.oshi=ERROR

# Hardware Monitor Polling Interval (in milliseconds)
hardware.monitor.interval=5000
